# 默认页面配置（请勿直接修改）。
# 建议复制到 config/user/pages/projects.yml 并按需调整。
title: 项目 # 页面标题
subtitle: 项目展示 # 页面副标题

# 指定使用的模板文件名，现有页面模板可见 templates/pages（不含 .hbs）
template: projects

# 页面分类与站点列表
#
# projects 模板采用“代码仓库风”卡片（repo 风格）。
# 统计信息（language/stars/forks）为自动获取数据：
# - 运行 `npm run sync-projects` 会联网抓取 GitHub 仓库信息，并写入 dev/ 缓存（仓库默认 gitignore）
# - `npm run build` 默认不联网；缓存缺失时卡片仅展示标题与描述
categories:
  - name: AI开源项目 / 代码仓库
    icon: fab fa-github
    path:
      - 机器学习 / AI / 大模型
    sites:
      - name: easy-few-shot-learning
        url: https://github.com/sicara/easy-few-shot-learning
        icon: fab fa-github
        description: "Few-Shot学习示例代码框架"

      - name: FewShotPapers
        url: https://github.com/tata1661/FSL-Mate/tree/master/FewShotPapers
        icon: fab fa-github
        description: "Few-Shot论文合集与分类"

      - name: timm (pytorch-image-models)
        url: https://github.com/huggingface/pytorch-image-models
        icon: fab fa-github
        description: "PyTorch视觉模型库"

      - name: all-in-rag
        url: https://github.com/datawhalechina/all-in-rag
        icon: fab fa-github
        description: "RAG技术全栈实战教程"

      - name: hello-agents
        url: https://github.com/datawhalechina/hello-agents
        icon: fab fa-github
        description: "从零构建AI智能体教程"

      - name: Foundations-of-LLMs
        url: https://github.com/ZJU-LLMs/Foundations-of-LLMs
        icon: fab fa-github
        description: "浙江大学大模型基础教材"

      - name: docling
        url: https://github.com/docling-project/docling
        icon: fab fa-github
        description: "文档解析与结构化处理工具"

      - name: RAG_Techniques
        url: https://github.com/NirDiamant/RAG_Techniques
        icon: fab fa-github
        description: "RAG系统高级技术实现合集"

      - name: MinerU
        url: https://github.com/opendatalab/MinerU
        icon: fab fa-github
        description: "PDF文档结构化解析工具"
